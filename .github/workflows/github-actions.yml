name: GitHub RAVEN test
run-name: ${{ github.actor }} is testing out RAVEN
on: [push, pull_request]

concurrency:
  # Here the group is defined by the head_ref of the PR
  group: ${{ github.head_ref }}
  # Here we specify that we'll cancel any "in progress" workflow of the same group. Thus if we push, ammend a commit and push
  # again the previous workflow will be cancelled, thus saving us github action build minutes and avoid any conflicts
  cancel-in-progress: true

jobs:
  Test-RAVEN-Ubuntu-Latest:
    runs-on: ubuntu-latest
    # runs-on: ubuntu-22.04
    steps:
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          channels: conda-forge, defaults
          activate-environment: raven_libraries
          use-only-tar-bz2: true  # IMPORTANT: This needs to be set for caching to work properly!
          auto-update-conda: true
          auto-activate-base: true

      - name: Job Information
        run: |
          echo " The job was automatically triggered by a ${{ github.event_name }} event."
          echo " This job is now running on a ${{ runner.os }} server"
          echo " The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."

      - name: Fetch and Branch
        uses: actions/checkout@v3

      - name: Install Plugins
        run: |
          pwd
          python3 ./scripts/install_plugins.py -s TEAL
          python3 ./scripts/install_plugins.py -s SR2ML
          python3 ./scripts/install_plugins.py -s BayCal
          python3 ./scripts/install_plugins.py -s POEM

      - name: Set Python Environment
        run: |
          ./scripts/establish_conda_env.sh --install

      - name: Build Raven
        run: |
          ./build_raven

      - name: Test RAVEN
        # if: always()
        # continue-on-error: true # numba library cause autoarma failed for latest ubuntu
        run: |
          export LD_LIBRARY_PATH=/home/runner/miniconda3/envs/raven_libraries/lib
          ./run_tests --library-report
          ./run_tests -j4 --raven

      - name: Test Plugins
        run: |
          ./run_tests -j4 --plugins
        continue-on-error: true

      - name: Install Additional Plugins
        run: |
          pwd
          python3 ./scripts/install_plugins.py -s LOGOS
          python3 ./scripts/install_plugins.py -s HERON
          python3 ./scripts/install_plugins.py -s DOVE
        continue-on-error: true

      - name: Reset Python Environment with Plugins Libraries
        run: |
          ./scripts/establish_conda_env.sh --install
        continue-on-error: true

      - name: Rebuild Raven
        run: |
          ./build_raven
        continue-on-error: true

      - name: Test Additional Plugins
        run: |
          ./run_tests -j4 --plugins
        continue-on-error: true

